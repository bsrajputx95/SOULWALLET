# Logstash Pipeline Configuration for SoulWallet
# Ingests logs from Pino, parses JSON, and outputs to Elasticsearch

input {
  # TCP input for Pino logs
  tcp {
    port => 5044
    codec => json_lines
    type => "soulwallet-api"
  }

  # Beats input (optional, for Filebeat)
  beats {
    port => 5045
    type => "filebeat"
  }
}

filter {
  # Parse JSON logs from Pino
  if [type] == "soulwallet-api" {
    # Ensure timestamp is properly parsed
    if [time] {
      date {
        match => ["time", "UNIX_MS", "ISO8601"]
        target => "@timestamp"
        remove_field => ["time"]
      }
    }

    # Map Pino log levels to standard levels
    if [level] {
      translate {
        field => "level"
        destination => "log_level"
        dictionary => {
          "10" => "trace"
          "20" => "debug"
          "30" => "info"
          "40" => "warn"
          "50" => "error"
          "60" => "fatal"
        }
        fallback => "info"
      }
    }

    # Extract request metadata
    if [req] {
      mutate {
        add_field => {
          "http_method" => "%{[req][method]}"
          "http_url" => "%{[req][url]}"
        }
      }
    }

    if [res] {
      mutate {
        add_field => {
          "http_status_code" => "%{[res][statusCode]}"
        }
      }
    }

    # Extract user and request identifiers
    if [userId] {
      mutate {
        add_field => { "user_id" => "%{[userId]}" }
      }
    }

    if [requestId] {
      mutate {
        add_field => { "request_id" => "%{[requestId]}" }
      }
    }

    # Extract trace context for correlation
    if [traceId] {
      mutate {
        add_field => { "trace_id" => "%{[traceId]}" }
      }
    }

    if [spanId] {
      mutate {
        add_field => { "span_id" => "%{[spanId]}" }
      }
    }

    # Add environment metadata
    mutate {
      add_field => {
        "environment" => "${NODE_ENV:production}"
        "service_name" => "soulwallet-api"
      }
    }

    # Parse error stack traces
    if [err] and [err][stack] {
      mutate {
        add_field => { "error_stack" => "%{[err][stack]}" }
        add_field => { "error_message" => "%{[err][message]}" }
        add_field => { "error_type" => "%{[err][type]}" }
      }
    }

    # Grok pattern for extracting endpoint from URL
    grok {
      match => {
        "http_url" => "^(?<endpoint>/[^?]*)(\?.*)?$"
      }
      tag_on_failure => []
    }

    # Remove sensitive fields
    mutate {
      remove_field => [
        "[req][headers][authorization]",
        "[req][headers][cookie]",
        "[req][headers][x-csrf-token]",
        "password",
        "token",
        "privateKey",
        "mnemonic",
        "secret"
      ]
    }
  }

  # Add geo-ip information for client IPs (optional)
  if [client_ip] and [client_ip] !~ /^(127\.|10\.|172\.(1[6-9]|2[0-9]|3[01])\.|192\.168\.)/ {
    geoip {
      source => "client_ip"
      target => "geoip"
      tag_on_failure => ["_geoip_lookup_failure"]
    }
  }
}

output {
  # Output to Elasticsearch
  elasticsearch {
    hosts => ["${ELASTICSEARCH_HOSTS:elasticsearch:9200}"]
    index => "soulwallet-logs-%{+YYYY.MM.dd}"
    user => "${ELASTICSEARCH_USER:elastic}"
    password => "${ELASTICSEARCH_PASSWORD}"
    ilm_enabled => true
    ilm_rollover_alias => "soulwallet-logs"
    ilm_pattern => "{now/d}-000001"
    ilm_policy => "soulwallet-logs-policy"
  }

  # Debug output to stdout (disable in production)
  if "${LOGSTASH_DEBUG:false}" == "true" {
    stdout {
      codec => rubydebug
    }
  }
}
