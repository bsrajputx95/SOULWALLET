version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: soulwallet-postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-soulwallet}
      POSTGRES_SHARED_BUFFERS: 512MB
      POSTGRES_EFFECTIVE_CACHE_SIZE: 1536MB
      POSTGRES_MAX_CONNECTIONS: 200
      POSTGRES_WORK_MEM: 4MB
      POSTGRES_HOST_AUTH_METHOD: scram-sha-256
      # Comment 2 Fix: TDE encryption key path
      POSTGRES_DATA_ENCRYPTION_KEY_PATH: /var/lib/postgresql/encryption/data_encryption.key
      POSTGRES_INITDB_ARGS: "-E UTF8 --locale=en_US.utf8 --data-checksums"
    # WAL archiving, pg_stat_statements, and SSL configuration
    command: >
      postgres
      -c wal_level=replica
      -c archive_mode=on
      -c archive_command='test ! -f /var/lib/postgresql/wal_archive/%f && cp %p /var/lib/postgresql/wal_archive/%f'
      -c max_wal_senders=3
      -c wal_keep_size=1024
      -c shared_preload_libraries=pg_stat_statements
      -c pg_stat_statements.track=all
      -c pg_stat_statements.max=10000
      -c ssl=on
      -c ssl_cert_file=/var/lib/postgresql/ssl/server.crt
      -c ssl_key_file=/var/lib/postgresql/ssl/server.key
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - postgres_wal_archive:/var/lib/postgresql/wal_archive
      # Comment 2 Fix: Mount SSL and encryption directories
      - ./ssl/postgres:/var/lib/postgresql/ssl:ro
      - ./ssl/postgres/encryption:/var/lib/postgresql/encryption:ro
      # Comment 2 Fix: Mount init scripts for TDE setup
      - ./scripts/init-postgres-encryption.sh:/docker-entrypoint-initdb.d/10-init-encryption.sh:ro
    deploy:
      resources:
        limits:
          memory: 2g
          cpus: '2.0'
      restart_policy:
        condition: on-failure
    logging:
      driver: json-file
      options:
        max-size: 50m
        max-file: 5
    labels:
      - "logging.service=postgres"
      - "logging.environment=production"
    security_opt:
      - no-new-privileges:true
    read_only: false  # Changed to false to allow WAL archiving
    cap_drop:
      - ALL
    privileged: false

  redis:
    image: redis:7-alpine
    container_name: soulwallet-redis
    restart: always
    command: redis-server --maxmemory 1gb --maxmemory-policy allkeys-lru --appendonly yes --appendfsync everysec
    volumes:
      # Writable volume for append-only and RDB persistence
      - redis_data:/data
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: '1.0'
      restart_policy:
        condition: on-failure
    logging:
      driver: json-file
      options:
        max-size: 50m
        max-file: 5
    labels:
      - "logging.service=redis"
      - "logging.environment=production"
    security_opt:
      - no-new-privileges:true
    # Note: read_only removed to allow appendonly persistence
    cap_drop:
      - ALL
    privileged: false

  # Comment 3 Fix: PostgreSQL Read Replica for scaling reads
  postgres-replica:
    image: postgres:15-alpine
    container_name: soulwallet-postgres-replica
    restart: always
    environment:
      POSTGRES_REPLICATION_MODE: replica
      POSTGRES_MASTER_SERVICE: postgres
      POSTGRES_MASTER_PORT_NUMBER: 5432
      POSTGRES_REPLICATION_USER: ${POSTGRES_REPLICATION_USER:-replicator}
      POSTGRES_REPLICATION_PASSWORD: ${POSTGRES_REPLICATION_PASSWORD}
    volumes:
      - postgres_data_replica:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          memory: 2g
          cpus: '2.0'
    depends_on:
      - postgres
    logging:
      driver: json-file
      options:
        max-size: 50m
        max-file: 5
    labels:
      - "logging.service=postgres-replica"
      - "logging.environment=production"

  # Comment 3 Fix: PgBouncer for connection pooling
  pgbouncer:
    image: edoburu/pgbouncer:1.21.0
    container_name: soulwallet-pgbouncer
    restart: always
    ports:
      - "6432:6432"
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-soulwallet}
      POOL_MODE: transaction
      MAX_CLIENT_CONN: 1000
      DEFAULT_POOL_SIZE: 50
      MIN_POOL_SIZE: 10
      RESERVE_POOL_SIZE: 25
      RESERVE_POOL_TIMEOUT: 5
      AUTH_TYPE: scram-sha-256
      AUTH_FILE: /etc/pgbouncer/userlist.txt
    volumes:
      - ./pgbouncer/userlist.txt:/etc/pgbouncer/userlist.txt:ro
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: '0.5'
    depends_on:
      - postgres
    logging:
      driver: json-file
      options:
        max-size: 50m
        max-file: 5
    labels:
      - "logging.service=pgbouncer"
      - "logging.environment=production"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h localhost -p 6432 -U pgbouncer"]
      interval: 10s
      timeout: 5s
      retries: 3

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    image: ${DOCKER_REGISTRY:-}soulwallet-backend:${VERSION:-latest}
    ports:
      - '3001:3001'
    restart: always
    environment:
      NODE_ENV: production
      LOG_LEVEL: warn
      ENABLE_PLAYGROUND: false
      ENABLE_INTROSPECTION: false
      FEATURE_SIMULATION_MODE: false
      SESSION_FINGERPRINT_STRICT: true
      # Comment 3 Fix: Use PgBouncer for connection pooling
      DATABASE_URL: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@pgbouncer:6432/${POSTGRES_DB:-soulwallet}?pgbouncer=true
      # Comment 3 Fix: Read replica for scaling reads
      DATABASE_READ_REPLICA_URL: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres-replica:5432/${POSTGRES_DB:-soulwallet}
      # Encryption key for pgcrypto
      PGCRYPTO_KEY: ${PGCRYPTO_KEY}
      # OpenTelemetry configuration
      OTEL_TRACING_ENABLED: true
      OTEL_SERVICE_NAME: soulwallet-api
      OTEL_EXPORTER_JAEGER_ENDPOINT: http://jaeger:14268/api/traces
    deploy:
      resources:
        limits:
          memory: 4g
          cpus: '4.0'
      restart_policy:
        condition: on-failure
      replicas: 2
      update_config:
        parallelism: 1
        delay: 10s
      rollback_config:
        parallelism: 0
        order: stop-first
    depends_on:
      - postgres
      - pgbouncer
      - redis
    logging:
      driver: json-file
      options:
        max-size: 50m
        max-file: 5
    labels:
      - "logging.service=backend"
      - "logging.environment=production"
    security_opt:
      - no-new-privileges:true
    read_only: true
    cap_drop:
      - ALL
    privileged: false
    networks:
      backend:
        aliases:
          - backend-blue
      database: {}
      cache: {}

  backend-green:
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 3002
      LOG_LEVEL: warn
      ENABLE_PLAYGROUND: false
      ENABLE_INTROSPECTION: false
      FEATURE_SIMULATION_MODE: false
      SESSION_FINGERPRINT_STRICT: true
      DATABASE_URL: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@pgbouncer:6432/${POSTGRES_DB:-soulwallet}?pgbouncer=true
      DATABASE_READ_REPLICA_URL: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres-replica:5432/${POSTGRES_DB:-soulwallet}
      PGCRYPTO_KEY: ${PGCRYPTO_KEY}
      OTEL_TRACING_ENABLED: true
      OTEL_SERVICE_NAME: soulwallet-api
      OTEL_EXPORTER_JAEGER_ENDPOINT: http://jaeger:14268/api/traces
    ports:
      - '3002:3002'
    depends_on:
      - postgres
      - pgbouncer
      - redis
    logging:
      driver: json-file
      options:
        max-size: 50m
        max-file: 5
    labels:
      - "logging.service=backend-green"
      - "logging.environment=production"
    security_opt:
      - no-new-privileges:true
    read_only: true
    cap_drop:
      - ALL
    privileged: false
    healthcheck:
      test: ['CMD', 'wget', '--no-verbose', '--tries=1', '--spider', 'http://localhost:3002/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      backend:
        aliases:
          - backend-green
      database: {}
      cache: {}

  backend-canary:
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 3003
      LOG_LEVEL: warn
      ENABLE_PLAYGROUND: false
      ENABLE_INTROSPECTION: false
      FEATURE_SIMULATION_MODE: false
      SESSION_FINGERPRINT_STRICT: true
      DATABASE_URL: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@pgbouncer:6432/${POSTGRES_DB:-soulwallet}?pgbouncer=true
      DATABASE_READ_REPLICA_URL: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres-replica:5432/${POSTGRES_DB:-soulwallet}
      PGCRYPTO_KEY: ${PGCRYPTO_KEY}
      OTEL_TRACING_ENABLED: true
      OTEL_SERVICE_NAME: soulwallet-api-canary
      OTEL_EXPORTER_JAEGER_ENDPOINT: http://jaeger:14268/api/traces
      CANARY: 'true'
    ports:
      - '3003:3003'
    depends_on:
      - postgres
      - pgbouncer
      - redis
    logging:
      driver: json-file
      options:
        max-size: 50m
        max-file: 5
    labels:
      - "logging.service=backend-canary"
      - "logging.environment=production"
      - "deployment.type=canary"
    security_opt:
      - no-new-privileges:true
    read_only: true
    cap_drop:
      - ALL
    privileged: false
    healthcheck:
      test: ['CMD', 'wget', '--no-verbose', '--tries=1', '--spider', 'http://localhost:3003/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      backend:
        aliases:
          - backend-canary
      database: {}
      cache: {}

  nginx:
    image: fholzer/nginx-brotli:latest
    restart: always
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl/nginx:/etc/nginx/ssl:ro
    ports:
      - '80:80'
      - '443:443'
      - '443:443/udp'  # HTTP/3 QUIC
    depends_on:
      - backend
      - backend-green
    logging:
      driver: json-file
      options:
        max-size: 50m
        max-file: 5
    labels:
      - "logging.service=nginx"
      - "logging.environment=production"
    security_opt:
      - no-new-privileges:true
    read_only: true
    cap_drop:
      - ALL
    privileged: false
    networks:
      - backend

  # ===========================================
  # FEATURE FLAGS
  # ===========================================

  # Unleash - Feature Flag Management
  unleash:
    image: unleashorg/unleash-server:latest
    container_name: soulwallet-unleash
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/unleash
      DATABASE_SSL: 'false'
      UNLEASH_URL: http://localhost:4242
      INIT_CLIENT_API_TOKENS: '*:development.unleash-insecure-api-token'
      LOG_LEVEL: warn
    ports:
      - '4242:4242'
    depends_on:
      - postgres
    healthcheck:
      test: ['CMD', 'wget', '--spider', '-q', 'http://localhost:4242/health']
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: '0.5'
    logging:
      driver: json-file
      options:
        max-size: 50m
        max-file: 3
    labels:
      - "logging.service=unleash"
      - "logging.environment=production"
    networks:
      - database
      - backend

  # ===========================================
  # OBSERVABILITY STACK
  # ===========================================

  # Prometheus - Metrics Collection
  prometheus:
    image: prom/prometheus:latest
    container_name: soulwallet-prometheus
    restart: unless-stopped
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-lifecycle'
      - '--web.enable-admin-api'
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    ports:
      - '9090:9090'
    healthcheck:
      test: ['CMD', 'wget', '--spider', '-q', 'http://localhost:9090/-/healthy']
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: '1.0'
    logging:
      driver: json-file
      options:
        max-size: 50m
        max-file: 3
    labels:
      - "logging.service=prometheus"
      - "logging.environment=production"

  # AlertManager - Alert Routing
  alertmanager:
    image: prom/alertmanager:latest
    container_name: soulwallet-alertmanager
    restart: unless-stopped
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
    volumes:
      - ./alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data:/alertmanager
    ports:
      - '9093:9093'
    healthcheck:
      test: ['CMD', 'wget', '--spider', '-q', 'http://localhost:9093/-/healthy']
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: '0.5'
    logging:
      driver: json-file
      options:
        max-size: 50m
        max-file: 3

  # Jaeger - Distributed Tracing
  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: soulwallet-jaeger
    restart: unless-stopped
    environment:
      COLLECTOR_ZIPKIN_HOST_PORT: ':9411'
      COLLECTOR_OTLP_ENABLED: 'true'
    ports:
      - '16686:16686'  # UI
      - '14268:14268'  # HTTP collector
      - '6831:6831/udp'  # UDP agent
    healthcheck:
      test: ['CMD', 'wget', '--spider', '-q', 'http://localhost:16686/']
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: '1.0'
    logging:
      driver: json-file
      options:
        max-size: 50m
        max-file: 3
    labels:
      - "logging.service=jaeger"
      - "logging.environment=production"

  # Elasticsearch - Log Storage
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    container_name: soulwallet-elasticsearch
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms1g -Xmx1g"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    ports:
      - '9200:9200'
    healthcheck:
      test: ['CMD-SHELL', 'curl -f http://localhost:9200/_cluster/health || exit 1']
      interval: 30s
      timeout: 10s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 2g
          cpus: '2.0'
    logging:
      driver: json-file
      options:
        max-size: 50m
        max-file: 3
    labels:
      - "logging.service=elasticsearch"
      - "logging.environment=production"

  # Logstash - Log Processing
  logstash:
    image: docker.elastic.co/logstash/logstash:8.11.0
    container_name: soulwallet-logstash
    restart: unless-stopped
    volumes:
      - ./logstash.conf:/usr/share/logstash/pipeline/logstash.conf:ro
    ports:
      - '5044:5044'
      - '9600:9600'
    depends_on:
      elasticsearch:
        condition: service_healthy
    environment:
      - ELASTICSEARCH_HOSTS=elasticsearch:9200
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: '1.0'
    logging:
      driver: json-file
      options:
        max-size: 50m
        max-file: 3
    labels:
      - "logging.service=logstash"
      - "logging.environment=production"

  # Kibana - Log Visualization
  kibana:
    image: docker.elastic.co/kibana/kibana:8.11.0
    container_name: soulwallet-kibana
    restart: unless-stopped
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200
    ports:
      - '5601:5601'
    depends_on:
      elasticsearch:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'curl -f http://localhost:5601/api/status || exit 1']
      interval: 30s
      timeout: 10s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: '1.0'
    logging:
      driver: json-file
      options:
        max-size: 50m
        max-file: 3
    labels:
      - "logging.service=kibana"
      - "logging.environment=production"

  # ===========================================
  # FAULT INJECTION - Toxiproxy
  # ===========================================
  # Toxiproxy enables real fault injection for chaos testing
  # Unlike Chaos Mesh which requires Kubernetes, Toxiproxy works with Docker Compose
  
  toxiproxy:
    image: ghcr.io/shopify/toxiproxy:2.7.0
    container_name: soulwallet-toxiproxy
    restart: unless-stopped
    ports:
      - '8474:8474'   # API for managing proxies
      - '5433:5433'   # Postgres proxy
      - '6380:6380'   # Redis proxy
    healthcheck:
      test: ['CMD', 'wget', '--spider', '-q', 'http://localhost:8474/version']
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: '0.5'
    logging:
      driver: json-file
      options:
        max-size: 50m
        max-file: 3
    labels:
      - "logging.service=toxiproxy"
      - "logging.environment=production"

  # Grafana - Visualization & Dashboards
  grafana:
    image: grafana/grafana:latest
    container_name: soulwallet-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: false
      GF_SERVER_ROOT_URL: ${GRAFANA_ROOT_URL:-http://localhost:3000}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml:ro
      - ./grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
    ports:
      - '3000:3000'
    depends_on:
      - prometheus
      - elasticsearch
    healthcheck:
      test: ['CMD-SHELL', 'curl -f http://localhost:3000/api/health || exit 1']
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: '0.5'
    logging:
      driver: json-file
      options:
        max-size: 50m
        max-file: 3
    labels:
      - "logging.service=grafana"
      - "logging.environment=production"

# Additional volumes for observability stack
volumes:
  postgres_data:
    driver: local
  postgres_wal_archive:
    driver: local
  postgres_data_replica:
    driver: local
  redis_data:
    driver: local
  prometheus_data:
    driver: local
  alertmanager_data:
    driver: local
  elasticsearch_data:
    driver: local
  grafana_data:
    driver: local


