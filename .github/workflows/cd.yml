name: CD - Deploy

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  security-gates:
    name: Security Gates
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:14
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: soulwallet_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/soulwallet_test
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: test-jwt-secret-for-ci
      JWT_REFRESH_SECRET: test-refresh-secret-for-ci
      SOLANA_RPC_URL: https://api.devnet.solana.com
      NODE_ENV: test
      ENABLE_API_LOGGING: 'false'
      LOG_API_REQUEST_ACTIVITY: 'false'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Generate Prisma Client
        run: npx prisma generate
      - name: Run database migrations
        run: npx prisma migrate deploy
      - name: Build server
        run: npm run server:build
      - name: Start server
        run: node dist/server/fastify.js &
      - name: Wait for server
        run: |
          for i in {1..30}; do
            if curl -fsS http://localhost:3001/health >/dev/null; then
              exit 0
            fi
            echo "Waiting for server..."
            sleep 2
          done
          echo "Server did not become healthy in time" >&2
          exit 1
      - name: Run Snyk security scan
        uses: snyk/actions/node@master
        if: ${{ secrets.SNYK_TOKEN != '' }}
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high --fail-on=all --sarif-file-output=snyk.sarif
      - name: Upload Snyk results
        uses: github/codeql-action/upload-sarif@v3
        if: ${{ secrets.SNYK_TOKEN != '' }}
        with:
          sarif_file: snyk.sarif
      - name: Run OWASP ZAP scan
        uses: zaproxy/action-full-scan@v0.4.0
        with:
          target: 'http://localhost:3001'
          rules_file_name: '.zap/rules.tsv'
          cmd_options: '-a'
      - name: SonarQube Scan
        uses: sonarsource/sonarqube-scan-action@master
        if: ${{ secrets.SONAR_TOKEN != '' && secrets.SONAR_HOST_URL != '' }}
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
      - name: SonarQube Quality Gate
        uses: sonarsource/sonarqube-quality-gate-action@master
        timeout-minutes: 5
        if: ${{ secrets.SONAR_TOKEN != '' && secrets.SONAR_HOST_URL != '' }}
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  deploy-backend:
    name: Deploy Backend
    runs-on: self-hosted
    needs: security-gates
    environment:
      name: production
      url: https://api.soulwallet.com
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Generate Prisma Client
        run: npm run db:generate
      
      - name: Verify environment configuration
        run: npm run validate-env
        env:
          NODE_ENV: production
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          REDIS_URL: ${{ secrets.REDIS_URL }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          JWT_REFRESH_SECRET: ${{ secrets.JWT_REFRESH_SECRET }}
          SOLANA_RPC_URL: ${{ secrets.SOLANA_RPC_URL }}
          EXPO_PUBLIC_SOLANA_RPC_URL: ${{ secrets.SOLANA_RPC_URL }}
          ALLOWED_ORIGINS: ${{ secrets.ALLOWED_ORIGINS }}
          FEATURE_SIMULATION_MODE: 'false'
          SESSION_FINGERPRINT_STRICT: 'true'
          CSRF_ENABLED: 'true'
          WALLET_ENCRYPTION_KEY: ${{ secrets.WALLET_ENCRYPTION_KEY }}
          KMS_PROVIDER: ${{ secrets.KMS_PROVIDER }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          AWS_KMS_KEY_ID: ${{ secrets.AWS_KMS_KEY_ID }}
          VAULT_ADDR: ${{ secrets.VAULT_ADDR }}
          VAULT_TOKEN: ${{ secrets.VAULT_TOKEN }}
      
      - name: Check migration status
        run: |
          npx prisma migrate status
          echo "Migration status checked"
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
      
      - name: Backup database before migration
        run: |
          ./scripts/backup-database.sh
          backup_file=$(ls -t backups/backup-*.dump | head -1)
          echo "BACKUP_FILE=$backup_file" >> $GITHUB_ENV
          echo "Database backup created: $backup_file"
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
      
      - name: Apply migrations
        run: |
          npx prisma migrate deploy
          npx prisma migrate status
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
      
      - name: Build backend
        run: npm run server:build

      - name: Deploy blue-green (zero-downtime)
        run: |
          chmod +x ./scripts/deploy-bluegreen.sh ./scripts/backup-database.sh ./scripts/restore-database.sh
          ./scripts/deploy-bluegreen.sh --environment production
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          REDIS_URL: ${{ secrets.REDIS_URL }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          JWT_REFRESH_SECRET: ${{ secrets.JWT_REFRESH_SECRET }}
          SOLANA_RPC_URL: ${{ secrets.SOLANA_RPC_URL }}
      
      - name: Rollback on failure
        if: failure()
        run: |
          echo "Deployment failed, initiating rollback"
          chmod +x ./scripts/emergency-rollback.sh ./scripts/restore-database.sh
          ./scripts/emergency-rollback.sh --auto
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
      
      - name: Deployment notification
        if: always()
        run: |
          status="${{ job.status }}"
          message="Deployment $status for ${{ github.ref }} at $(date)"
          curl -X POST -H 'Content-type: application/json' --data "{\"text\":\"$message\"}" ${{ secrets.SLACK_WEBHOOK_URL }}

  rollback:
    name: Rollback Deployment
    runs-on: self-hosted
    needs: deploy-backend
    if: failure()
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Emergency rollback
        run: |
          chmod +x ./scripts/emergency-rollback.sh ./scripts/restore-database.sh
          ./scripts/emergency-rollback.sh --auto
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
      
      - name: Notify team of rollback
        run: |
          message="Rollback initiated for ${{ github.ref }} at $(date)"
          curl -X POST -H 'Content-type: application/json' --data "{\"text\":\"$message\"}" ${{ secrets.SLACK_WEBHOOK_URL }}

  deploy-docker:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: security-gates
    if: ${{ needs.security-gates.result == 'success' }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      
      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
      
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKER_USERNAME }}/soulwallet
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha
      
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/soulwallet:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/soulwallet:buildcache,mode=max
      
      - name: Sign image with Cosign
        uses: sigstore/cosign-installer@main
        with:
          cosign-release: 'v2.2.3'
      
      - name: Verify signature
        run: cosign verify ${{ secrets.DOCKER_USERNAME }}/soulwallet:latest --keyless

  deploy-canary:
    name: Canary Deployment
    runs-on: self-hosted
    needs: [security-gates, deploy-backend]
    if: ${{ needs.security-gates.result == 'success' && github.event_name == 'workflow_dispatch' }}
    environment:
      name: canary
      url: https://canary.api.soulwallet.com
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Deploy canary with 10% traffic
        run: |
          chmod +x ./scripts/deploy-canary.sh
          ./scripts/deploy-canary.sh --percentage 10 --environment production
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          REDIS_URL: ${{ secrets.REDIS_URL }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          JWT_REFRESH_SECRET: ${{ secrets.JWT_REFRESH_SECRET }}
      
      - name: Monitor canary metrics
        run: |
          echo "Monitoring canary for 10 minutes..."
          sleep 600
          # Check error rate from Prometheus
          error_rate=$(curl -s "http://localhost:9090/api/v1/query?query=sum(rate(soulwallet_http_errors_total{service=\"canary\"}[5m]))" | jq -r '.data.result[0].value[1] // "0"')
          if (( $(echo "$error_rate > 0.01" | bc -l) )); then
            echo "Error rate too high: $error_rate"
            exit 1
          fi
      
      - name: Rollback canary on failure
        if: failure()
        run: |
          chmod +x ./scripts/deploy-canary.sh
          ./scripts/deploy-canary.sh --rollback
      
      - name: Promote canary (manual step)
        if: success()
        run: |
          echo "Canary deployment successful!"
          echo "To promote: ./scripts/deploy-canary.sh --promote"
          echo "To rollback: ./scripts/deploy-canary.sh --rollback"

  deploy-expo:
    name: Build & Submit Expo App
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
      
      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
      
      - name: Install dependencies
        run: npm ci
      
      - name: Pre-build validation
        run: |
          # Check app.json version matches git tag
          tag_version=$(echo ${{ github.ref }} | sed 's/refs\/tags\/v//')
          app_version=$(node -p "require('./app.json').expo.version")
          if [ "$tag_version" != "$app_version" ]; then
            echo "Version mismatch: tag $tag_version vs app $app_version"
            exit 1
          fi
          # Verify credentials
          if [ -z "${{ secrets.EXPO_TOKEN }}" ]; then
            echo "EXPO_TOKEN not set"
            exit 1
          fi
          # Run eas build:inspect
          eas build:inspect --platform ios
      
      - name: Build iOS app
        run: eas build --platform ios --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
      
      - name: Build Android app
        run: eas build --platform android --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
      
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: expo-builds
          path: |
            dist/
          retention-days: 90
      
      - name: Submit to App Store
        run: eas submit --platform ios --latest
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
      
      - name: Submit to Google Play
        run: eas submit --platform android --latest
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
      
      - name: Submission verification
        run: |
          # Check submission status
          eas submit:status --platform ios
          eas submit:status --platform android
          # Notify team
          message="Expo app submitted for ${{ github.ref }} at $(date)"
          curl -X POST -H 'Content-type: application/json' --data "{\"text\":\"$message\"}" ${{ secrets.SLACK_WEBHOOK_URL }}
