# =============================================================================
# SOULWALLET ANDROID BUILD WORKFLOW
# =============================================================================
# Automated Android builds, testing, and deployment
#
# Triggers:
#   - Push to main: Build beta APK
#   - Push to release/*: Build production AAB
#   - Tags v*: Build and submit to Play Store
#   - Pull requests: Validate build
#   - Manual: Any profile
# =============================================================================

name: Android Build

on:
  push:
    branches:
      - main
      - 'release/*'
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      profile:
        description: 'Build profile'
        required: true
        default: 'beta-apk'
        type: choice
        options:
          - development
          - beta-apk
          - preview
          - production
      submit:
        description: 'Submit to Play Store'
        required: false
        default: false
        type: boolean

env:
  NODE_VERSION: '18'
  EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

jobs:
  # ===========================================================================
  # VALIDATE
  # ===========================================================================
  validate:
    name: Validate
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run type check
        run: npm run type-check
        continue-on-error: true

      - name: Run linter
        run: npm run lint
        continue-on-error: true

      - name: Run unit tests
        run: npm run test:unit
        continue-on-error: true

      - name: Check for exposed secrets
        run: npm run prebuild

  # ===========================================================================
  # BUILD BETA APK
  # ===========================================================================
  build-beta:
    name: Build Beta APK
    runs-on: ubuntu-latest
    needs: validate
    if: |
      github.event_name == 'push' && github.ref == 'refs/heads/main' ||
      github.event_name == 'workflow_dispatch' && github.event.inputs.profile == 'beta-apk'
    
    outputs:
      build-url: ${{ steps.build.outputs.build-url }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Setup EAS CLI
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm ci

      - name: Optimize assets
        run: |
          # Skip if tools not available
          if command -v pngquant &> /dev/null; then
            npm run optimize:assets || true
          fi
        continue-on-error: true

      - name: Build beta APK
        id: build
        run: |
          BUILD_OUTPUT=$(eas build --platform android --profile beta-apk --non-interactive --json)
          echo "build-url=$(echo $BUILD_OUTPUT | jq -r '.[0].artifacts.buildUrl')" >> $GITHUB_OUTPUT

      - name: Analyze build size
        run: npm run analyze:build-size --latest || true
        continue-on-error: true

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: beta-apk-${{ github.sha }}
          path: |
            *.apk
            build-size-history.json
          retention-days: 30
          if-no-files-found: ignore

  # ===========================================================================
  # BUILD PRODUCTION AAB
  # ===========================================================================
  build-production:
    name: Build Production AAB
    runs-on: ubuntu-latest
    needs: validate
    if: |
      startsWith(github.ref, 'refs/tags/v') ||
      github.event_name == 'workflow_dispatch' && github.event.inputs.profile == 'production'
    
    outputs:
      build-url: ${{ steps.build.outputs.build-url }}
      version: ${{ steps.version.outputs.version }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Setup EAS CLI
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm ci

      - name: Get version
        id: version
        run: |
          VERSION=$(node -p "require('./app.json').expo.version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Verify version matches tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG_VERSION=${GITHUB_REF#refs/tags/v}
          APP_VERSION=${{ steps.version.outputs.version }}
          if [ "$TAG_VERSION" != "$APP_VERSION" ]; then
            echo "Error: Tag version ($TAG_VERSION) doesn't match app version ($APP_VERSION)"
            exit 1
          fi

      - name: Optimize assets
        run: |
          if command -v pngquant &> /dev/null; then
            npm run optimize:assets || true
          fi
        continue-on-error: true

      - name: Build production AAB
        id: build
        run: |
          BUILD_OUTPUT=$(eas build --platform android --profile production --non-interactive --json)
          echo "build-url=$(echo $BUILD_OUTPUT | jq -r '.[0].artifacts.buildUrl')" >> $GITHUB_OUTPUT

      - name: Analyze build size
        run: npm run analyze:build-size --latest || true
        continue-on-error: true

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: production-aab-${{ github.sha }}
          path: |
            *.aab
            build-size-history.json
          retention-days: 90
          if-no-files-found: ignore

  # ===========================================================================
  # TEST BUILD
  # ===========================================================================
  test-build:
    name: Test Build
    runs-on: ubuntu-latest
    needs: [build-beta, build-production]
    if: always() && (needs.build-beta.result == 'success' || needs.build-production.result == 'success')
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Download beta APK
        if: needs.build-beta.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: beta-apk-${{ github.sha }}
          path: ./build
        continue-on-error: true

      - name: Download production AAB
        if: needs.build-production.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: production-aab-${{ github.sha }}
          path: ./build
        continue-on-error: true

      - name: Verify build artifacts
        run: |
          echo "Build artifacts:"
          ls -la ./build/ || echo "No build directory"
          
          # Check for APK or AAB
          if ls ./build/*.apk 1> /dev/null 2>&1; then
            echo "✅ APK found"
            ls -lh ./build/*.apk
          fi
          
          if ls ./build/*.aab 1> /dev/null 2>&1; then
            echo "✅ AAB found"
            ls -lh ./build/*.aab
          fi

      - name: Upload test results
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ github.sha }}
          path: __tests__/reports/
          retention-days: 14
          if-no-files-found: ignore

  # ===========================================================================
  # SUBMIT TO PLAY STORE
  # ===========================================================================
  submit:
    name: Submit to Play Store
    runs-on: ubuntu-latest
    needs: [build-production, test-build]
    if: |
      needs.build-production.result == 'success' &&
      (startsWith(github.ref, 'refs/tags/v') || github.event.inputs.submit == 'true')
    environment: production
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Setup EAS CLI
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm ci

      - name: Submit to Play Store
        run: eas submit --platform android --profile production --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Notify success
        if: success()
        run: |
          echo "✅ Successfully submitted version ${{ needs.build-production.outputs.version }} to Play Store"

  # ===========================================================================
  # CREATE GITHUB RELEASE
  # ===========================================================================
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-production]
    if: startsWith(github.ref, 'refs/tags/v') && needs.build-production.result == 'success'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download production AAB
        uses: actions/download-artifact@v4
        with:
          name: production-aab-${{ github.sha }}
          path: ./build

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          name: Release ${{ needs.build-production.outputs.version }}
          body: |
            ## SoulWallet v${{ needs.build-production.outputs.version }}
            
            ### Downloads
            - Production AAB attached below
            - Or download from [EAS Build](${{ needs.build-production.outputs.build-url }})
            
            ### Changes
            See [CHANGELOG.md](CHANGELOG.md) for details.
          files: |
            ./build/*.aab
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ===========================================================================
  # NOTIFY
  # ===========================================================================
  notify:
    name: Send Notifications
    runs-on: ubuntu-latest
    needs: [validate, build-beta, build-production, submit]
    if: always()
    
    steps:
      - name: Determine status
        id: status
        run: |
          if [ "${{ needs.submit.result }}" == "success" ]; then
            echo "status=✅ Production build submitted to Play Store" >> $GITHUB_OUTPUT
            echo "color=good" >> $GITHUB_OUTPUT
          elif [ "${{ needs.build-production.result }}" == "success" ]; then
            echo "status=✅ Production build completed" >> $GITHUB_OUTPUT
            echo "color=good" >> $GITHUB_OUTPUT
          elif [ "${{ needs.build-beta.result }}" == "success" ]; then
            echo "status=✅ Beta build completed" >> $GITHUB_OUTPUT
            echo "color=good" >> $GITHUB_OUTPUT
          elif [ "${{ needs.validate.result }}" == "failure" ]; then
            echo "status=❌ Validation failed" >> $GITHUB_OUTPUT
            echo "color=danger" >> $GITHUB_OUTPUT
          else
            echo "status=⚠️ Build completed with warnings" >> $GITHUB_OUTPUT
            echo "color=warning" >> $GITHUB_OUTPUT
          fi

      - name: Post to Slack
        if: env.SLACK_WEBHOOK_URL != ''
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "Android Build: ${{ steps.status.outputs.status }}",
              "attachments": [
                {
                  "color": "${{ steps.status.outputs.color }}",
                  "fields": [
                    {
                      "title": "Repository",
                      "value": "${{ github.repository }}",
                      "short": true
                    },
                    {
                      "title": "Branch/Tag",
                      "value": "${{ github.ref_name }}",
                      "short": true
                    },
                    {
                      "title": "Commit",
                      "value": "${{ github.sha }}",
                      "short": true
                    },
                    {
                      "title": "Actor",
                      "value": "${{ github.actor }}",
                      "short": true
                    }
                  ]
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
