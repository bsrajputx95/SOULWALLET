name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:14
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: soulwallet_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      toxiproxy:
        image: ghcr.io/shopify/toxiproxy:2.7.0
        ports:
          - 8474:8474   # Toxiproxy API
          - 5433:5433   # Postgres proxy
          - 6380:6380   # Redis proxy
        options: >-
          --health-cmd "wget --spider -q http://localhost:8474/version || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/soulwallet_test
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: test-jwt-secret-for-ci
      JWT_REFRESH_SECRET: test-refresh-secret-for-ci
      SOLANA_RPC_URL: https://api.devnet.solana.com
      NODE_ENV: test
      ENABLE_API_LOGGING: 'false'
      LOG_API_REQUEST_ACTIVITY: 'false'
      RUN_INTEGRATION_TESTS: 'true'
      TOXIPROXY_URL: http://localhost:8474
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install deps
        run: npm ci
      - name: Generate Prisma Client
        run: npx prisma generate
      - name: Run database migrations
        run: npx prisma migrate deploy
      - name: Type check
        run: npm run type-check
      - name: Lint
        run: npm run lint
      - name: Format check
        run: npm run format:check
      - name: Test with coverage (includes integration tests)
        run: npm run test:coverage -- --coverageReporters=json-summary
      - name: Enforce coverage threshold (95%)
        run: node -e "const fs=require('fs');const s=JSON.parse(fs.readFileSync('coverage/coverage-summary.json','utf8')).total;const ok=[s.lines,s.branches,s.functions,s.statements].every(m=>m.pct>=95);if(!ok){console.error('Coverage below 95%',s);process.exit(1)}"
      
      # Comment 4: Snyk security scan
      - name: Snyk security scan
        uses: snyk/actions/node@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high
      
      # Comment 4: SonarQube quality gate
      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@master
        continue-on-error: true
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        with:
          args: >
            -Dsonar.projectKey=soulwallet
            -Dsonar.sources=src
            -Dsonar.tests=__tests__
            -Dsonar.typescript.lcov.reportPaths=coverage/lcov.info
            -Dsonar.coverage.exclusions=**/*.test.ts,**/*.spec.ts
            -Dsonar.qualitygate.wait=true
      
      - name: Build server
        run: npm run server:build
      - name: Start server
        run: node dist/server/fastify.js &
      - name: Wait for server
        run: |
          for i in {1..30}; do
            if curl -fsS http://localhost:3001/health >/dev/null; then
              exit 0
            fi
            echo "Waiting for server..."
            sleep 2
          done
          echo "Server did not become healthy in time" >&2
          exit 1
      - name: Install k6
        run: |
          sudo apt-get update
          sudo apt-get install -y ca-certificates gnupg
          sudo mkdir -p /etc/apt/keyrings
          curl -fsSL https://dl.k6.io/key.gpg | sudo gpg --dearmor -o /etc/apt/keyrings/k6-archive-keyring.gpg
          echo "deb [signed-by=/etc/apt/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install -y k6
      - name: Run load tests
        run: |
          k6 run tests/load/api-load-test.js --summary-export load-test-summary.json -e BASE_URL=http://localhost:3001 -e CI=true -e MAX_VUS=1000
      - name: Verify load test thresholds
        run: node -e "const fs=require('fs');const d=JSON.parse(fs.readFileSync('load-test-summary.json','utf8'));const p95=d.metrics.http_req_duration.values['p(95)'];const err=d.metrics.http_req_failed.values.rate;if(p95>200){console.error('P95 exceeds 200ms',p95);process.exit(1)}if(err>0.01){console.error('Error rate exceeds 1%',err);process.exit(1)}console.log('Load test ok', {p95, err});"
      - name: Run security tests
        run: npm run test:security
      - name: Run chaos tests (fault injection via Toxiproxy)
        run: npm run test:chaos
