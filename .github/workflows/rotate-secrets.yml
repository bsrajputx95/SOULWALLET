name: Rotate Secrets

on:
  schedule:
    # Run monthly on the 1st at 2 AM UTC
    - cron: '0 2 1 * *'
  workflow_dispatch:
    inputs:
      rotate_jwt:
        description: 'Rotate JWT secrets'
        required: false
        default: 'true'
        type: boolean
      rotate_db:
        description: 'Rotate database credentials'
        required: false
        default: 'false'
        type: boolean
      rotate_encryption:
        description: 'Rotate encryption keys'
        required: false
        default: 'false'
        type: boolean

jobs:
  rotate-secrets:
    name: Rotate Secrets
    runs-on: self-hosted
    environment: production
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci

      - name: Authenticate with Vault
        id: vault-auth
        run: |
          # Authenticate with Vault using AppRole
          TOKEN=$(curl -s -X POST \
            -d "{\"role_id\":\"${{ secrets.VAULT_ROLE_ID }}\",\"secret_id\":\"${{ secrets.VAULT_SECRET_ID }}\"}" \
            "${{ secrets.VAULT_ADDR }}/v1/auth/approle/login" | jq -r '.auth.client_token')
          echo "VAULT_TOKEN=$TOKEN" >> $GITHUB_ENV
        env:
          VAULT_ADDR: ${{ secrets.VAULT_ADDR }}
      
      - name: Rotate JWT secrets
        if: ${{ github.event_name == 'schedule' || inputs.rotate_jwt == 'true' }}
        run: |
          echo "Rotating JWT secrets..."
          
          # Generate new secrets
          NEW_JWT_SECRET=$(openssl rand -base64 64 | tr -d '\n')
          NEW_JWT_REFRESH_SECRET=$(openssl rand -base64 64 | tr -d '\n')
          
          # Calculate transition period end (24 hours from now)
          TRANSITION_END=$(date -d '+24 hours' -u +%Y-%m-%dT%H:%M:%SZ)
          
          # Store in Vault (keeping old keys for transition period)
          curl -s -X POST \
            -H "X-Vault-Token: $VAULT_TOKEN" \
            -d "{\"data\":{
              \"jwt_secret\":\"$NEW_JWT_SECRET\",
              \"jwt_secret_previous\":\"$JWT_SECRET\",
              \"jwt_refresh_secret\":\"$NEW_JWT_REFRESH_SECRET\",
              \"jwt_refresh_secret_previous\":\"$JWT_REFRESH_SECRET\",
              \"transition_end\":\"$TRANSITION_END\"
            }}" \
            "${{ secrets.VAULT_ADDR }}/v1/secret/data/soulwallet/jwt"
          
          echo "JWT secrets rotated. Transition period ends: $TRANSITION_END"
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          JWT_REFRESH_SECRET: ${{ secrets.JWT_REFRESH_SECRET }}
          VAULT_ADDR: ${{ secrets.VAULT_ADDR }}
      
      - name: Rotate database credentials
        if: ${{ inputs.rotate_db == 'true' }}
        run: |
          echo "Rotating database credentials via Vault..."
          
          # Request new credentials from Vault database engine
          CREDS=$(curl -s -X GET \
            -H "X-Vault-Token: $VAULT_TOKEN" \
            "${{ secrets.VAULT_ADDR }}/v1/database/creds/soulwallet-app")
          
          NEW_USER=$(echo "$CREDS" | jq -r '.data.username')
          NEW_PASS=$(echo "$CREDS" | jq -r '.data.password')
          LEASE_ID=$(echo "$CREDS" | jq -r '.lease_id')
          
          echo "New database credentials generated"
          echo "Lease ID: $LEASE_ID"
          echo "LEASE_ID=$LEASE_ID" >> $GITHUB_ENV
          
          # Trigger rolling restart of backend services
          ./scripts/rolling-restart.sh --service backend
        env:
          VAULT_ADDR: ${{ secrets.VAULT_ADDR }}
      
      - name: Rotate encryption keys
        if: ${{ inputs.rotate_encryption == 'true' }}
        run: |
          echo "Rotating encryption keys..."
          
          # Rotate Transit key version
          curl -s -X POST \
            -H "X-Vault-Token: $VAULT_TOKEN" \
            "${{ secrets.VAULT_ADDR }}/v1/transit/keys/soulwallet/rotate"
          
          echo "Transit encryption key rotated"
          
          # Get new key version
          KEY_INFO=$(curl -s -X GET \
            -H "X-Vault-Token: $VAULT_TOKEN" \
            "${{ secrets.VAULT_ADDR }}/v1/transit/keys/soulwallet")
          
          NEW_VERSION=$(echo "$KEY_INFO" | jq -r '.data.latest_version')
          echo "New key version: $NEW_VERSION"
        env:
          VAULT_ADDR: ${{ secrets.VAULT_ADDR }}
      
      - name: Verify rotation
        run: |
          echo "Verifying secret rotation..."
          
          # Test Vault connectivity
          HEALTH=$(curl -s "${{ secrets.VAULT_ADDR }}/v1/sys/health")
          if echo "$HEALTH" | jq -e '.sealed == false' > /dev/null; then
            echo "✓ Vault is healthy and unsealed"
          else
            echo "✗ Vault health check failed"
            exit 1
          fi
          
          # Verify JWT secrets in Vault
          JWT_CHECK=$(curl -s -X GET \
            -H "X-Vault-Token: $VAULT_TOKEN" \
            "${{ secrets.VAULT_ADDR }}/v1/secret/data/soulwallet/jwt")
          
          if echo "$JWT_CHECK" | jq -e '.data.data.jwt_secret' > /dev/null; then
            echo "✓ JWT secrets accessible in Vault"
          else
            echo "✗ JWT secrets not found"
            exit 1
          fi
        env:
          VAULT_ADDR: ${{ secrets.VAULT_ADDR }}
      
      - name: Notify team
        if: always()
        run: |
          STATUS="${{ job.status }}"
          MESSAGE="🔐 Secret rotation $STATUS at $(date)"
          
          if [[ "$STATUS" == "success" ]]; then
            MESSAGE="$MESSAGE\n✓ Secrets rotated successfully"
          else
            MESSAGE="$MESSAGE\n✗ Secret rotation failed - check workflow logs"
          fi
          
          curl -X POST -H 'Content-type: application/json' \
            --data "{\"text\":\"$MESSAGE\"}" \
            "${{ secrets.SLACK_WEBHOOK_URL }}"
      
      - name: Clean up old secrets
        if: success()
        run: |
          echo "Scheduling cleanup of previous secret versions..."
          
          # This would typically be handled by a separate cleanup job
          # that runs after the transition period
          echo "Previous secrets will be removed after transition period"
