# AlertManager Configuration for SoulWallet
# Routes alerts to appropriate channels based on severity

global:
  # SMTP configuration for email alerts
  smtp_smarthost: '${SMTP_HOST:-smtp.gmail.com}:${SMTP_PORT:-587}'
  smtp_from: '${ALERT_EMAIL_FROM:-alerts@soulwallet.com}'
  smtp_auth_username: '${SMTP_USER}'
  smtp_auth_password: '${SMTP_PASSWORD}'
  smtp_require_tls: true

  # Slack configuration (optional)
  slack_api_url: '${SLACK_WEBHOOK_URL}'

  # PagerDuty configuration (optional)
  pagerduty_url: 'https://events.pagerduty.com/v2/enqueue'

# Templates for alert messages
templates:
  - '/etc/alertmanager/templates/*.tmpl'

# Inhibition rules - suppress low-priority alerts when high-priority fires
inhibit_rules:
  # If API is down, suppress all other API alerts
  - source_match:
      alertname: APIDown
    target_match_re:
      alertname: '(HighErrorRate|HighLatency)'
    equal: ['instance']

  # If database pool is unhealthy, suppress connection warnings
  - source_match:
      alertname: DatabasePoolUnhealthy
    target_match:
      alertname: HighDatabaseConnections
    equal: ['instance']

# Route configuration
route:
  # Default receiver
  receiver: 'webhook'
  
  # Group alerts by alertname and severity
  group_by: ['alertname', 'severity']
  
  # Wait time before sending first notification
  group_wait: 30s
  
  # Interval between notification batches
  group_interval: 5m
  
  # Interval before resending
  repeat_interval: 4h

  # Child routes for specific severities
  routes:
    # Critical alerts - immediate notification to all channels
    - match:
        severity: critical
      receiver: 'critical-alerts'
      group_wait: 10s
      repeat_interval: 1h
      continue: true

    # Warning alerts - webhook only
    - match:
        severity: warning
      receiver: 'webhook'
      group_wait: 1m
      repeat_interval: 4h

    # Info alerts - log only
    - match:
        severity: info
      receiver: 'webhook'
      group_wait: 5m
      repeat_interval: 12h

# Receivers - notification channels
receivers:
  # Webhook receiver - sends to SoulWallet API
  - name: 'webhook'
    webhook_configs:
      - url: 'http://backend:3001/api/alerts/prometheus'
        send_resolved: true
        max_alerts: 10
        http_config:
          basic_auth:
            username: '${PROMETHEUS_WEBHOOK_USER:-prometheus}'
            password: '${PROMETHEUS_WEBHOOK_PASSWORD}'

  # Critical alerts - multiple channels
  - name: 'critical-alerts'
    webhook_configs:
      - url: 'http://backend:3001/api/alerts/prometheus'
        send_resolved: true

    email_configs:
      - to: '${ALERT_EMAIL_TO:-oncall@soulwallet.com}'
        send_resolved: true
        headers:
          Subject: '[CRITICAL] SoulWallet Alert: {{ .GroupLabels.alertname }}'
        html: |
          <html>
            <body>
              <h2>🚨 Critical Alert: {{ .GroupLabels.alertname }}</h2>
              <p><strong>Status:</strong> {{ .Status | toUpper }}</p>
              <p><strong>Summary:</strong> {{ range .Alerts }}{{ .Annotations.summary }}{{ end }}</p>
              <p><strong>Description:</strong> {{ range .Alerts }}{{ .Annotations.description }}{{ end }}</p>
              <p><strong>Time:</strong> {{ .Alerts.Firing | len }} firing, {{ .Alerts.Resolved | len }} resolved</p>
              <hr>
              <p><a href="{{ range .Alerts }}{{ .Annotations.runbook_url }}{{ end }}">View Runbook</a></p>
            </body>
          </html>

    slack_configs:
      - channel: '#alerts-critical'
        send_resolved: true
        icon_emoji: ':rotating_light:'
        title: '{{ .GroupLabels.alertname }}'
        text: |
          *Status:* {{ .Status | toUpper }}
          *Summary:* {{ range .Alerts }}{{ .Annotations.summary }}{{ end }}
          *Description:* {{ range .Alerts }}{{ .Annotations.description }}{{ end }}
          <{{ range .Alerts }}{{ .Annotations.runbook_url }}{{ end }}|View Runbook>

  # Null receiver for silenced alerts
  - name: 'null'
