version: '3.8'

# Usage instructions:
# Development: docker-compose up
# Staging: docker-compose -f docker-compose.yml -f docker-compose.staging.yml up
# Production: docker-compose -f docker-compose.yml -f docker-compose.prod.yml up -d

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: soulwallet-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-soulwallet}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-soulwallet_password}
      POSTGRES_DB: ${POSTGRES_DB:-soulwallet}
      # Production-ready settings
      POSTGRES_SHARED_BUFFERS: 256MB
      POSTGRES_EFFECTIVE_CACHE_SIZE: 1GB
      POSTGRES_MAINTENANCE_WORK_MEM: 64MB
      POSTGRES_CHECKPOINT_COMPLETION_TARGET: 0.9
      POSTGRES_WAL_BUFFERS: 16MB
      POSTGRES_DEFAULT_STATISTICS_TARGET: 100
      POSTGRES_RANDOM_PAGE_COST: 1.1
      POSTGRES_EFFECTIVE_IO_CONCURRENCY: 200
      POSTGRES_WORK_MEM: 4MB
      POSTGRES_MAX_CONNECTIONS: 100
      # SSL/TLS configuration for production
      POSTGRES_SSL_CERT_FILE: /etc/ssl/certs/postgres.crt
      POSTGRES_SSL_KEY_FILE: /etc/ssl/private/postgres.key
      POSTGRES_SSL_CA_FILE: /etc/ssl/certs/ca.crt
      POSTGRES_INITDB_ARGS: "-E UTF8 --locale=en_US.utf8"
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./ssl/postgres:/etc/ssl/certs:ro
      - ./ssl/postgres/private:/etc/ssl/private:ro
      - ./backups:/backups
      - postgres_backups:/backups
    command: postgres -c shared_buffers=256MB -c max_connections=100
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-soulwallet}']
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: '1.0'
        reservations:
          memory: 256M
          cpus: '0.25'
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: 3
    labels:
      - "service.name=postgres"
      - "service.type=database"
      - "monitoring.enable=true"
    networks:
      - database
    profiles:
      - default
      - staging
      - production

  # Redis Cache (Optional)
  redis:
    image: redis:7-alpine
    container_name: soulwallet-redis
    restart: unless-stopped
    command: redis-server --maxmemory 512mb --maxmemory-policy allkeys-lru --appendonly yes ${REDIS_PASSWORD:+--requirepass $REDIS_PASSWORD}
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
      - ./ssl/redis:/etc/ssl/certs:ro
    healthcheck:
      test: ['CMD-SHELL', 'redis-cli ${REDIS_PASSWORD:+-a "$REDIS_PASSWORD"} ping | grep PONG']
      interval: 10s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: '0.5'
        reservations:
          memory: 128M
          cpus: '0.1'
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: 3
    labels:
      - "service.name=redis"
      - "service.type=cache"
      - "monitoring.enable=true"
    networks:
      - cache
    profiles:
      - default
      - staging
      - production

  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: soulwallet-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-soulwallet}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-rabbitmq_password}
      RABBITMQ_DEFAULT_VHOST: /
      RABBITMQ_VM_MEMORY_HIGH_WATERMARK: 512MB
    ports:
      - '5672:5672'
      - '15672:15672'
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ['CMD', 'rabbitmq-diagnostics', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: '0.5'
    networks:
      - backend
    profiles:
      - default
      - staging
      - production

  # SoulWallet Backend
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: soulwallet-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: ${PORT:-3001}
      HOST: ${HOST:-0.0.0.0}
      DATABASE_URL: postgresql://${POSTGRES_USER:-soulwallet}:${POSTGRES_PASSWORD:-soulwallet_password}@postgres:5432/${POSTGRES_DB:-soulwallet}
      REDIS_URL: redis://${REDIS_PASSWORD:+:$REDIS_PASSWORD@}redis:6379
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      SOLANA_RPC_URL: ${SOLANA_RPC_URL}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
      # Comment 1: RabbitMQ connection for queue-based processing
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-soulwallet}:${RABBITMQ_PASSWORD:-rabbitmq_password}@rabbitmq:5672
      RABBITMQ_USER: ${RABBITMQ_USER:-soulwallet}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-rabbitmq_password}
    ports:
      - '3001:3001'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    volumes:
      - ./logs:/app/logs
      - ./backups:/app/backups
    healthcheck:
      test: ['CMD', 'wget', '--no-verbose', '--tries=1', '--spider', 'http://localhost:3001/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 2g
          cpus: '2.0'
        reservations:
          memory: 512M
          cpus: '0.5'
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    labels:
      - "service.name=backend"
      - "service.type=app"
      - "monitoring.enable=true"
      - "traefik.enable=true"
      - "traefik.http.routers.backend.rule=Host(`api.soulwallet.com`)"
      - "traefik.http.services.backend.loadbalancer.server.port=3001"
      - "com.soulwallet.service=backend"
      - "com.soulwallet.environment=${NODE_ENV}"
    networks:
      - backend
      - database
      - cache
    profiles:
      - default
      - staging
      - production

  # Automated Database Backup Service
  backup:
    image: postgres:15-alpine
    container_name: soulwallet-backup
    restart: unless-stopped
    command: sh -c "chmod +x /app/scripts/backup-database.sh && /app/scripts/backup-database.sh"
    env_file:
      - .env.production
    environment:
      BACKUP_DIR: /app/backups
      NOTIFICATION_EMAIL: ${NOTIFICATION_EMAIL:-admin@soulwallet.com}
      DATABASE_URL: postgresql://${POSTGRES_USER:-soulwallet}:${POSTGRES_PASSWORD:-soulwallet_password}@postgres:5432/${POSTGRES_DB:-soulwallet}
    volumes:
      - ./scripts:/app/scripts:ro
      - ./backups:/app/backups
      - postgres_backups:/backups
      - /etc/localtime:/etc/localtime:ro
    depends_on:
      postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.1'
        reservations:
          memory: 64M
          cpus: '0.05'
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: 3
    labels:
      - "service.name=backup"
      - "service.type=utility"
      - "monitoring.enable=true"
    networks:
      - database
    profiles:
      - staging
      - production

volumes:
  postgres_data:
    driver: local
  postgres_replica_data:
    driver: local
  redis_data:
    driver: local
  postgres_backups:
    driver: local
  backend_logs:
    driver: local
  rabbitmq_data:
    driver: local

networks:
  database:
    driver: bridge
  cache:
    driver: bridge
  backend:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

